name: tests

# Cross-platform test matrix: builds the native kernels and runs the C
# correctness suite + the Python smoke test on x86-64 Linux, x86-64 macOS,
# arm64 macOS, and x86-64 Windows.
#
#   Linux   -> gcc     (AVX-512 / AVX2 / scalar auto-dispatch, OpenMP)
#   macOS   -> clang   (x86 SIMD or arm64 scalar; single-thread, still correct)
#   Windows -> MinGW   (MSYS2 gcc handles the GNU-assembler .S, cpuid.h,
#                       __builtin_* and OpenMP with no code changes)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64 (gcc, AVX-512/AVX2)
            os: ubuntu-latest
          - name: macos-x86_64 (clang)
            os: macos-13
          - name: macos-arm64 (clang, scalar)
            os: macos-latest
          - name: windows-x86_64 (mingw)
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Linux + macOS: native toolchain already on the runner
      # ------------------------------------------------------------------
      - name: Set up Python (Unix)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build + C correctness tests (Linux)
        if: runner.os == 'Linux'
        run: make lib test

      - name: Build + C correctness tests (macOS)
        if: runner.os == 'macOS'
        # Apple clang has no -fopenmp; build single-threaded (still correct).
        run: make lib test CFLAGS="-O3 -Wall -Wextra -Iinclude"

      - name: Install package + Python smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy
          python -m pip install .
          python -m stabkernel

      # ------------------------------------------------------------------
      # Windows: MSYS2 + MinGW-w64 (GCC toolchain, no source changes needed)
      # ------------------------------------------------------------------
      - name: Set up MSYS2 / MinGW-w64 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-python-wheel

      - name: Build + C tests + Python smoke test (Windows/MinGW)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mingw32-make lib test CC=gcc
          python -m pip install --no-build-isolation .
          python -m stabkernel

  # --------------------------------------------------------------------
  # Android ARM: cross-compile only (no on-device run). arm64-v8a uses the
  # NEON kernels; armeabi-v7a falls back to the portable scalar backend.
  # --------------------------------------------------------------------
  android:
    name: android-${{ matrix.abi }} (ndk, build-only)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            triple: aarch64-linux-android
          - abi: armeabi-v7a
            triple: armv7a-linux-androideabi
    steps:
      - uses: actions/checkout@v4
      - name: Locate Android NDK
        run: echo "NDK=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}" >> "$GITHUB_ENV"
      - name: Cross-compile shared library (${{ matrix.abi }})
        run: |
          set -e
          API=24
          TC="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CC="$TC/${{ matrix.triple }}$API-clang"
          echo "Using compiler: $CC"
          SRC="src/gf2_scalar.c src/dispatch.c src/gf2_linalg.c src/wrappers.c src/gf2_parallel.c"
          if [ "${{ matrix.abi }}" = "arm64-v8a" ]; then SRC="$SRC src/gf2_arm.S"; fi
          "$CC" -O3 -Wall -Iinclude -fPIC -shared -fopenmp -static-openmp \
                $SRC -o libstabkernel-${{ matrix.abi }}.so
          echo "--- built artifact ---"
          file libstabkernel-${{ matrix.abi }}.so
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: libstabkernel-${{ matrix.abi }}.so
